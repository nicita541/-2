services:
  postgres:
    image: postgres:16-alpine
    container_name: task-manager-postgres
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: task_manager
      POSTGRES_PASSWORD: task_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_manager -d task_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/TaskManager.Api/Dockerfile
    container_name: task-manager-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=task_manager;Username=task_manager;Password=task_manager
      Jwt__Issuer: TaskManager
      Jwt__Audience: TaskManagerClients
      Jwt__Secret: LOCAL_DOCKER_SECRET_CHANGE_BEFORE_PRODUCTION_1234567890
      Jwt__AccessTokenMinutes: 120
    ports:
      - "8080:8080"

volumes:
  postgres-data:
